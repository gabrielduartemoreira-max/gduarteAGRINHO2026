<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho - Agro Forte, Futuro Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🌱 Agro Forte, Futuro Sustentável 🌎</h1>

        <div class="hud">
            <p>Pontos: <span id="score">0</span></p>
            <p>Tempo: <span id="time">30</span>s</p>
        </div>

        <div id="game-area"></div>

        <button id="start-btn">Iniciar Jogo</button>

        <div class="instructions">
            <h2>Como Jogar</h2>
            <p>
                Clique apenas nos itens sustentáveis 🌱 para ganhar pontos.
                Evite os itens poluentes 🛢️.
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
